<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RH Sim — Gestão Operacional</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />

  <link href="style.css" rel="stylesheet" />
  <link href="auth.css" rel="stylesheet" />
</head>
<body>

<!-- ===== SIDEBAR ===== -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon"><i class="bi bi-shield-fill-check"></i></div>
    <div class="brand-text">
      <span class="brand-name">RH Sim</span>
      <span class="brand-sub">Gestão Operacional</span>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section-label">Principal</div>
    <a class="nav-link-item active" data-page="dashboard" onclick="navigate('dashboard')">
      <i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span>
    </a>

    <div class="nav-section-label">Operacional</div>
    <a class="nav-link-item" data-page="producoes" onclick="navigate('producoes')">
      <i class="bi bi-printer-fill"></i><span>Produções</span>
    </a>
    <a class="nav-link-item" data-page="materiais" onclick="navigate('materiais')">
      <i class="bi bi-box-seam-fill"></i><span>Materiais</span>
    </a>

    <div class="nav-section-label">Cadastros</div>
    <a class="nav-link-item" data-page="empresas" onclick="navigate('empresas')">
      <i class="bi bi-building-fill"></i><span>Empresas</span>
    </a>
    <a class="nav-link-item" data-page="projetos" onclick="navigate('projetos')">
      <i class="bi bi-kanban-fill"></i><span>Projetos</span>
    </a>
    <a class="nav-link-item" data-page="operadores" onclick="navigate('operadores')">
      <i class="bi bi-people-fill"></i><span>Operadores</span>
    </a>

    <div class="nav-section-label">Análise</div>
    <a class="nav-link-item" data-page="relatorios" onclick="navigate('relatorios')">
      <i class="bi bi-bar-chart-fill"></i><span>Relatórios</span>
    </a>

    <div class="nav-section-label">Sistema</div>
    <a class="nav-link-item" data-page="atividades" onclick="navigate('atividades')">
      <i class="bi bi-clock-history"></i><span>Atividades</span>
    </a>
    <a class="nav-link-item" data-page="backup" onclick="navigate('backup')">
      <i class="bi bi-cloud-arrow-up-fill"></i><span>Backup</span>
    </a>
    <a class="nav-link-item" data-page="configuracoes" onclick="navigate('configuracoes')">
      <i class="bi bi-gear-fill"></i><span>Configurações</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="user-avatar-sm"><i class="bi bi-person-fill"></i></div>
      <div class="user-meta">
        <span class="user-name-sm">Administrador</span>
        <span class="user-ver">v1.0.0</span>
      </div>
      <button class="btn btn-sm btn-link text-decoration-none ms-auto p-1" title="Sair" style="color:var(--sidebar-text)" onclick="Auth.logout()">
        <i class="bi bi-box-arrow-right"></i>
      </button>
    </div>
  </div>
</aside>

<!-- ===== MAIN WRAPPER ===== -->
<div class="main-wrapper" id="mainWrapper">
  <header class="topbar">
    <div class="topbar-left">
      <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-0" id="breadcrumb">
          <li class="breadcrumb-item active">Dashboard</li>
        </ol>
      </nav>
    </div>
    <div class="topbar-right">
      <div class="topbar-date"><i class="bi bi-calendar3"></i><span id="currentDate"></span></div>
      <button class="topbar-btn position-relative" id="alertBtn" onclick="navigate('materiais')" title="Alertas de Estoque">
        <i class="bi bi-bell-fill"></i>
        <span class="alert-dot" id="alertDot" style="display:none"></span>
      </button>
      <button class="topbar-btn" onclick="navigate('backup')" title="Backup"><i class="bi bi-cloud-arrow-up"></i></button>
    </div>
  </header>

  <main class="page-content" id="pageContent"></main>
</div>

<!-- ===== TOAST CONTAINER ===== -->
<div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999"></div>

<!-- ===== CONFIRM MODAL ===== -->
<div class="modal fade" id="confirmModal" tabindex="-1">
  <div class="modal-dialog modal-sm modal-dialog-centered">
    <div class="modal-content confirm-modal-content">
      <div class="modal-body text-center p-4">
        <div class="confirm-icon"><i class="bi bi-exclamation-triangle-fill"></i></div>
        <h5 class="mt-3 mb-2">Confirmar Ação</h5>
        <p class="text-secondary mb-4" id="confirmMessage">Deseja continuar?</p>
        <div class="d-flex gap-2 justify-content-center">
          <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-danger" id="confirmBtn">Confirmar</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ===== SCRIPTS ===== -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<!-- SDK do Supabase + Store (ANTES do app.js) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="store.js"></script>
<script src="auth.js"></script>

<script src="app.js"></script>
<script src="dashboard.js"></script>
<script src="producao.js"></script>
<script src="materiais.js"></script>
<script src="empresas.js"></script>
<script src="creditos.js"></script>
<script src="projetos.js"></script>
<script src="operadores.js"></script>
<script src="relatorios.js"></script>
<script src="atividades.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", function () { Auth.boot(); });
</script>
</body>
</html>
